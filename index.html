<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<title>Kayla - Venda Consignada</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon-192-dark.png">
<style>
:root {
  --bg: #0f0f13;
  --bg2: #1a1a24;
  --bg3: #252530;
  --text: #ffffff;
  --text2: #a0a0b0;
  --accent: #7c5cfc;
  --accent2: #9b82fc;
  --success: #00c853;
  --warning: #ffab00;
  --error: #ff1744;
  --border: #2a2a35;
  --radius: 12px;
  --nav-height: 70px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  padding-bottom: var(--nav-height);
  overflow-x: hidden;
}

/* Header */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 20px; font-weight: 700; }
.header-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
.header-badges { display: flex; gap: 8px; margin-top: 8px; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-free { background: var(--bg3); color: var(--text2); }
.badge-pro { background: linear-gradient(135deg, #7c5cfc, #9b82fc); color: #fff; }
.badge-online { background: var(--success); color: #fff; }
.badge-offline { background: var(--error); color: #fff; }

/* Content */
.content { padding: 20px; }

/* Cards */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; text-transform: uppercase; }
.form-input, .form-select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}
.form-input:focus, .form-select:focus { border-color: var(--accent); }
.form-select { appearance: none; cursor: pointer; }

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 14px 20px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  margin-bottom: 12px;
  text-align: center;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }
.btn-error { background: var(--error); color: #fff; }
.btn-red { background: var(--error); color: #fff; }
.btn-sm { width: auto; display: inline-block; padding: 8px 16px; font-size: 13px; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: var(--nav-height);
  z-index: 1000;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text2);
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 12px;
  flex: 1;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 24px; height: 24px; fill: currentColor; }

/* Modal Overlay */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-content {
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 20px; }

/* Custom Confirm Modal */
.confirm-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 3000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.confirm-overlay.show { display: flex; }
.confirm-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.confirm-icon { font-size: 48px; margin-bottom: 16px; }
.confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.confirm-message { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
.confirm-buttons { display: flex; gap: 12px; }
.confirm-buttons .btn { flex: 1; margin-bottom: 0; }

/* Toast */
.toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5000;
  width: 90%;
  max-width: 400px;
}
.toast {
  padding: 14px 20px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-size: 14px;
  font-weight: 500;
  animation: slideDown 0.3s ease;
  text-align: center;
}
.toast-success { background: var(--success); color: #fff; }
.toast-error { background: var(--error); color: #fff; }
.toast-warning { background: var(--warning); color: #000; }
@keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Checkbox */
.checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.checkbox-group input { width: 18px; height: 18px; accent-color: var(--accent); }

/* Item List */
.item-list { list-style: none; }
.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-info { flex: 1; }
.item-name { font-size: 14px; font-weight: 600; }
.item-detail { font-size: 12px; color: var(--text2); }
.item-actions { display: flex; gap: 8px; }
.item-btn {
  background: var(--bg3);
  border: none;
  border-radius: 6px;
  padding: 8px;
  cursor: pointer;
  color: var(--text);
  font-size: 16px;
}
.item-btn:active { transform: scale(0.9); }
.item-btn.remove { color: var(--error); }

/* Scanner Area */
.scanner-area {
  background: var(--bg3);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 30px 20px;
  text-align: center;
  margin-bottom: 16px;
}
.scanner-area svg { width: 48px; height: 48px; fill: var(--accent); margin-bottom: 12px; }
.scanner-text { font-size: 14px; color: var(--text2); }

/* Empty State */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty-state svg { width: 64px; height: 64px; fill: var(--border); margin-bottom: 16px; }

/* Telas de seleção */
.selection-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  text-align: center;
}
.selection-logo { font-size: 64px; margin-bottom: 16px; }
.selection-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.selection-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
.selection-btns { width: 100%; max-width: 300px; }

/* Status badges */
.status-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
}
.status-aberto { background: rgba(255,171,0,0.2); color: var(--warning); }
.status-finalizado { background: rgba(0,200,83,0.2); color: var(--success); }
.status-devolvido { background: rgba(255,23,68,0.2); color: var(--error); }

/* Order Card */
.order-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.order-id { font-size: 16px; font-weight: 700; }
.order-info { font-size: 13px; color: var(--text2); }
.order-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.order-actions .btn { flex: 1; min-width: 100px; margin-bottom: 0; font-size: 13px; padding: 10px; }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.product-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
}
.product-card:active { border-color: var(--accent); }
.product-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.product-price { font-size: 14px; color: var(--accent); font-weight: 700; }
.product-stock { font-size: 11px; color: var(--text2); }

/* Cart */
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; }
.cart-item-qty { font-size: 12px; color: var(--text2); }
.cart-item-price { font-size: 14px; color: var(--accent); font-weight: 700; }
.cart-total {
  display: flex;
  justify-content: space-between;
  padding: 16px 0;
  font-size: 18px;
  font-weight: 700;
  border-top: 2px solid var(--border);
  margin-top: 12px;
}

/* Hide elements */
.hidden { display: none !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
