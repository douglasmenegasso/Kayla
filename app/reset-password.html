<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeffinir Senha - Kayla</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0f0f13;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #a0a0b0;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .label {
            font-size: 12px;
            font-weight: 600;
            color: #a0a0b0;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
        }
        .input {
            width: 100%;
            background: #252530;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .input:focus {
            border-color: #7c5cfc;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #7c5cfc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            background: #ff1744;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .success {
            background: #00c853;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .link a {
            color: #7c5cfc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <div class="title">Redefinir Senha</div>
            <div class="subtitle">Digite sua nova senha</div>
        </div>
        
        <div id="message"></div>
        
        <form id="reset-form" style="display:none">
            <div class="form-group">
                <label class="label">Nova Senha</label>
                <input type="password" class="input" id="new-password" placeholder="Digite a nova senha" required minlength="6">
            </div>
            
            <div class="form-group">
                <label class="label">Confirmar Senha</label>
                <input type="password" class="input" id="confirm-password" placeholder="Confirme a nova senha" required minlength="6">
            </div>
            
            <button type="submit" class="btn" id="btn-submit">🔐 Redefinir Senha</button>
        </form>
        
        <div class="link">
            <a href="/app/">← Voltar para o login</a>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        var SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
        var SUPABASE_KEY = 'YOUR_ANON_KEY';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var form = document.getElementById('reset-form');
        var message = document.getElementById('message');
        var btnSubmit = document.getElementById('btn-submit');

        // Verificar se há token na URL
        window.addEventListener('load', async function() {
            var hash = window.location.hash;
            
            if (hash.includes('error')) {
                // Erro no link
                var error = new URLSearchParams(hash.substring(1)).get('error_description');
                showMessage('❌ ' + (error || 'Link inválido ou expirado'), 'error');
                return;
            }
            
            if (hash.includes('access_token')) {
                // Token válido - mostrar formulário
                form.style.display = 'block';
            } else {
                // Sem token
                showMessage('⚠️ Link inválido ou expirado. Solicite uma nova redefinição de senha.', 'error');
            }
        });

        // Redefinir senha
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var newPassword = document.getElementById('new-password').value;
            var confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('❌ As senhas não coincidem', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('❌ A senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }
            
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Processando...';
            
            try {
                var result = await supabase.auth.updateUser({
                    password: newPassword
                });
                
                if (result.error) {
                    throw result.error;
                }
                
                showMessage('✅ Senha redefinida com sucesso! Redirecionando...', 'success');
                
                setTimeout(function() {
                    window.location.href = '/app/';
                }, 2000);
                
            } catch(error) {
                console.error('Erro ao redefinir senha:', error);
                showMessage('❌ Erro: ' + error.message, 'error');
                btnSubmit.disabled = false;
                btnSubmit.textContent = '🔐 Redefinir Senha';
            }
        });

        function showMessage(text, type) {
            message.innerHTML = '<div class="' + type + '">' + text + '</div>';
        }
    </script>
</body>
</html>
