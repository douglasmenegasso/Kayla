<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redefinir Senha - Kayla</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --bg: #0f0f13; --bg2: #1a1a24; --bg3: #252530; --text: #fff; --text2: #a0a0b0; --accent: #7c5cfc; --success: #00c853; --error: #ff1744; --border: #2a2a35; --radius: 12px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  min-height: 100vh; 
  padding: 20px;
}
.container { 
  background: var(--bg2); 
  border: 1px solid var(--border); 
  border-radius: var(--radius); 
  padding: 40px 30px; 
  width: 100%; 
  max-width: 400px; 
  text-align: center;
}
.logo { 
  font-size: 48px; 
  margin-bottom: 16px;
}
.title { 
  font-size: 24px; 
  font-weight: 700; 
  margin-bottom: 8px;
}
.subtitle { 
  font-size: 14px; 
  color: var(--text2); 
  margin-bottom: 24px;
}
.form-group { 
  margin-bottom: 16px; 
  text-align: left;
}
.form-label { 
  font-size: 12px; 
  font-weight: 600; 
  color: var(--text2); 
  margin-bottom: 6px; 
  display: block;
  text-transform: uppercase;
}
.form-input { 
  width: 100%; 
  background: var(--bg3); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  padding: 12px; 
  color: var(--text); 
  font-size: 15px;
  outline: none;
}
.form-input:focus { 
  border-color: var(--accent);
}
.btn { 
  display: block;
  width: 100%;
  padding: 14px 20px; 
  border-radius: 8px; 
  font-size: 15px; 
  font-weight: 600; 
  cursor: pointer; 
  border: none; 
  margin-bottom: 12px;
}
.btn-primary { 
  background: var(--accent); 
  color: #fff;
}
.btn:active { 
  transform: scale(0.97); 
}
.message { 
  padding: 12px; 
  border-radius: 8px; 
  margin-bottom: 16px;
  font-size: 14px;
}
.message.success { 
  background: rgba(0, 200, 83, 0.2); 
  color: var(--success);
  border: 1px solid var(--success);
}
.message.error { 
  background: rgba(255, 23, 68, 0.2); 
  color: var(--error);
  border: 1px solid var(--error);
}
.loading { 
  opacity: 0.6;
  pointer-events: none;
}
.success-container {
  display: none;
}
.countdown {
  font-size: 14px;
  color: var(--text2);
  margin-top: 16px;
}
</style>
</head>
<body>

<div class="container">
  <!-- Formulário de Redefinição -->
  <div id="password-form">
    <div class="logo">🔐</div>
    <div class="title">Redefinir Senha</div>
    <div class="subtitle">Kayla - Venda Consignada</div>
    
    <div id="message-container"></div>
    
    <div class="form-group">
      <label class="form-label">Nova Senha</label>
      <input type="password" id="nova-senha" class="form-input" placeholder="Mínimo 6 caracteres">
    </div>
    
    <div class="form-group">
      <label class="form-label">Confirmar Senha</label>
      <input type="password" id="confirmar-senha" class="form-input" placeholder="Repita a senha">
    </div>
    
    <button class="btn btn-primary" onclick="atualizarSenha()">💾 Salvar Nova Senha</button>
    
    <div style="margin-top:20px;font-size:12px;color:var(--text2)">
      <a href="index.html" style="color:var(--accent);text-decoration:none">← Voltar para o login</a>
    </div>
  </div>
  
  <!-- Mensagem de Sucesso -->
  <div id="success-container" class="success-container">
    <div class="logo">✅</div>
    <div class="title" style="color:var(--success)">Senha Alterada!</div>
    <div class="subtitle">Sua senha foi atualizada com sucesso.</div>
    
    <div class="message success">
      ✅ Você será redirecionado para o login em <strong id="countdown">5</strong> segundos...
    </div>
    
    <button class="btn btn-primary" onclick="window.location.href='index.html'">
      Ir para Login Agora
    </button>
  </div>
</div>

<script>
// Configuração do Supabase - Usar window.supabase para evitar conflito
var supabaseClient = window.supabase.createClient(
  'https://xwwklngrkvdwgiinycvt.supabase.co',
  'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S'
);

// Verificar se tem token de recuperação
window.addEventListener('DOMContentLoaded', async function() {
  const hash = window.location.hash;
  
  if (!hash || !hash.includes('access_token')) {
    showMessage('❌ Link de recuperação inválido ou expirado. Solicite um novo link.', 'error');
    document.getElementById('password-form').style.display = 'none';
  }
});

async function atualizarSenha() {
  const novaSenha = document.getElementById('nova-senha').value;
  const confirmarSenha = document.getElementById('confirmar-senha').value;
  
  if (!novaSenha || !confirmarSenha) {
    showMessage('❌ Preencha todos os campos', 'error');
    return;
  }
  
  if (novaSenha.length < 6) {
    showMessage('❌ Senha deve ter no mínimo 6 caracteres', 'error');
    return;
  }
  
  if (novaSenha !== confirmarSenha) {
    showMessage('❌ As senhas não conferem', 'error');
    return;
  }
  
  const btn = document.querySelector('.btn-primary');
  btn.classList.add('loading');
  btn.innerText = 'Salvando...';
  
  try {
    const { error } = await supabaseClient.auth.updateUser({ password: novaSenha });
    
    if (error) throw error;
    
    // Mostrar tela de sucesso
    document.getElementById('password-form').style.display = 'none';
    document.getElementById('success-container').style.display = 'block';
    
    // Contagem regressiva
    var segundos = 5;
    var countdownEl = document.getElementById('countdown');
    var interval = setInterval(function() {
      segundos--;
      countdownEl.innerText = segundos;
      if (segundos <= 0) {
        clearInterval(interval);
        window.location.href = 'index.html';
      }
    }, 1000);
    
  } catch (error) {
    showMessage('❌ Erro ao atualizar senha: ' + error.message, 'error');
    btn.classList.remove('loading');
    btn.innerText = '💾 Salvar Nova Senha';
  }
}

function showMessage(text, type) {
  const container = document.getElementById('message-container');
  container.innerHTML = '<div class="message ' + type + '">' + text + '</div>';
}
</script>

</body>
</html>
