<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Kayla</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #0f0f13;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 13px;
            color: #a0a0b0;
            text-align: center;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .label {
            font-size: 12px;
            font-weight: 600;
            color: #a0a0b0;
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
        }
        .input {
            width: 100%;
            background: #252530;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
        }
        .input:focus {
            border-color: #7c5cfc;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #7c5cfc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .error {
            background: #ff1744;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .success {
            background: #00c853;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .warning {
            background: #ffab00;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
        }
        .link a {
            color: #7c5cfc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <div class="title">Redefinir Senha</div>
            <div class="subtitle">Digite sua nova senha</div>
        </div>
        
        <div id="message"></div>
        
        <form id="reset-form" style="display:none">
            <div class="form-group">
                <label class="label">Nova Senha</label>
                <input type="password" class="input" id="new-password" placeholder="Digite a nova senha" required minlength="6">
            </div>
            
            <div class="form-group">
                <label class="label">Confirmar Senha</label>
                <input type="password" class="input" id="confirm-password" placeholder="Confirme a nova senha" required minlength="6">
            </div>
            
            <button type="submit" class="btn" id="btn-submit">🔐 Redefinir Senha</button>
        </form>
        
        <div class="link">
            <a href="/app/">← Voltar para o login</a>
        </div>
    </div>

    <script>
        // ============ CONFIGURAÇÃO DO SUPABASE ============
        // SUBSTITUA PELAS SUAS CREDENCIAIS REAIS DO SUPABASE
        var SUPABASE_URL = 'https://xwwklngrkvdwgiinycvt.supabase.co';  // ← Cole aqui a URL do seu projeto
        var SUPABASE_KEY = 'sb_publishable_2Viwv3t4SvejW4SEfvpxGA_5K5thi7S';                // ← Cole aqui a chave anon public
        
        // Criar cliente Supabase
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        var form = document.getElementById('reset-form');
        var message = document.getElementById('message');
        var btnSubmit = document.getElementById('btn-submit');

        // ============ VERIFICAR TOKEN NA URL ============
        window.addEventListener('load', async function() {
            console.log('[RESET] Verificando token na URL...');
            
            var hash = window.location.hash;
            
            if (!hash || hash.length === 0) {
                console.log('[RESET] Nenhum token na URL');
                showMessage('⚠️ Link inválido ou expirado. Solicite uma nova redefinição de senha.', 'error');
                return;
            }
            
            // Verificar erro na URL
            if (hash.includes('error')) {
                var error = new URLSearchParams(hash.substring(1)).get('error_description');
                console.error('[RESET] Erro na URL:', error);
                showMessage('❌ ' + (error || 'Link inválido ou expirado'), 'error');
                return;
            }
            
            // Verificar token de recuperação
            if (hash.includes('access_token') && hash.includes('type=recovery')) {
                console.log('[RESET] Token de recuperação detectado');
                
                // Extrair tokens da URL
                var params = new URLSearchParams(hash.substring(1));
                var accessToken = params.get('access_token');
                var refreshToken = params.get('refresh_token');
                
                console.log('[RESET] Access Token:', accessToken ? 'Presente' : 'Ausente');
                console.log('[RESET] Refresh Token:', refreshToken ? 'Presente' : 'Ausente');
                
                if (!accessToken) {
                    console.error('[RESET] Token ausente');
                    showMessage('❌ Link inválido. Solicite uma nova recuperação.', 'error');
                    return;
                }
                
                // Estabelecer sessão com o token
                try {
                    console.log('[RESET] Estabelecendo sessão...');
                    
                    var { data, error } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken || ''
                    });
                    
                    if (error) {
                        console.error('[RESET] Erro ao estabelecer sessão:', error);
                        showMessage('❌ Link expirado ou inválido. Solicite uma nova recuperação.', 'error');
                        return;
                    }
                    
                    if (!data || !data.session) {
                        console.error('[RESET] Sessão não estabelecida');
                        showMessage('❌ Não foi possível validar o link. Tente novamente.', 'error');
                        return;
                    }
                    
                    console.log('[RESET] ✅ Sessão estabelecida com sucesso');
                    console.log('[RESET] User:', data.user?.email);
                    
                    // Armazenar tokens para uso posterior
                    localStorage.setItem('kayla_reset_access_token', data.session.access_token);
                    localStorage.setItem('kayla_reset_refresh_token', data.session.refresh_token);
                    
                    // Mostrar formulário
                    form.style.display = 'block';
                    
                } catch(e) {
                    console.error('[RESET] Exceção ao estabelecer sessão:', e);
                    showMessage('❌ Erro de conexão. Tente novamente.', 'error');
                }
            } else {
                console.log('[RESET] Token inválido');
                showMessage('⚠️ Link inválido ou expirado. Solicite uma nova redefinição de senha.', 'error');
            }
        });

        // ============ REDEFINIR SENHA ============
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            var newPassword = document.getElementById('new-password').value;
            var confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('❌ As senhas não coincidem', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('❌ A senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }
            
            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Processando...';
            
            try {
                console.log('[RESET] Verificando sessão...');
                
                // Verificar se temos sessão válida
                var { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
                
                if (sessionError || !sessionData.session) {
                    console.error('[RESET] Sessão ausente, tentando restaurar...');
                    
                    // Tentar restaurar sessão com tokens armazenados
                    var storedAccessToken = localStorage.getItem('kayla_reset_access_token');
                    var storedRefreshToken = localStorage.getItem('kayla_reset_refresh_token');
                    
                    if (storedAccessToken) {
                        var { data: restoreData, error: restoreError } = await supabaseClient.auth.setSession({
                            access_token: storedAccessToken,
                            refresh_token: storedRefreshToken || ''
                        });
                        
                        if (restoreError || !restoreData.session) {
                            console.error('[RESET] Falha ao restaurar sessão:', restoreError);
                            showMessage('❌ Sessão expirada. Solicite um novo link de recuperação.', 'error');
                            btnSubmit.disabled = false;
                            btnSubmit.textContent = '🔐 Redefinir Senha';
                            return;
                        }
                        
                        console.log('[RESET] ✅ Sessão restaurada');
                    } else {
                        showMessage('❌ Sessão expirada. Solicite um novo link de recuperação.', 'error');
                        btnSubmit.disabled = false;
                        btnSubmit.textContent = '🔐 Redefinir Senha';
                        return;
                    }
                }
                
                console.log('[RESET] Atualizando senha...');
                
                // Atualizar senha
                var result = await supabaseClient.auth.updateUser({
                    password: newPassword
                });
                
                if (result.error) {
                    throw result.error;
                }
                
                console.log('[RESET] ✅ Senha atualizada com sucesso');
                showMessage('✅ Senha redefinida com sucesso! Redirecionando...', 'success');
                
                // Limpar tokens armazenados
                localStorage.removeItem('kayla_reset_access_token');
                localStorage.removeItem('kayla_reset_refresh_token');
                
                // Fazer logout
                try {
                    await supabaseClient.auth.signOut();
                    console.log('[RESET] Logout realizado');
                } catch(e) {
                    console.warn('[RESET] Erro ao fazer logout:', e);
                }
                
                // Redirecionar após 2 segundos
                setTimeout(function() {
                    window.location.href = '/app/';
                }, 2000);
                
            } catch(error) {
                console.error('[RESET] Erro ao redefinir senha:', error);
                showMessage('❌ Erro: ' + error.message, 'error');
                btnSubmit.disabled = false;
                btnSubmit.textContent = '🔐 Redefinir Senha';
            }
        });

        // ============ FUNÇÕES AUXILIARES ============
        function showMessage(text, type) {
            message.innerHTML = '<div class="' + type + '">' + text + '</div>';
        }
    </script>
</body>
</html>
