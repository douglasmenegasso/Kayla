<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Pendente - Kayla</title>
    <style>
        body {
            background: #0f0f13;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .pending-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffab00;
        }
        .subtitle {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 24px;
        }
        .btn {
            background: #7c5cfc;
            color: #fff;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="pending-icon">⏳</div>
        <div class="title">Pagamento Pendente</div>
        <div class="subtitle">Aguardando confirmação do pagamento.</div>
        <a href="/app/" class="btn">Voltar para o App</a>
    </div>
</body>
</html>
