<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Kayla</title>
    <link rel="icon" type="image/png" href="/app/assets/icons/icon-192-dark.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(124, 92, 252, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #7c5cfc;
            font-size: 24px;
        }
        .login-box .subtitle {
            text-align: center;
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid rgba(124, 92, 252, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }
        .login-box input:focus {
            outline: none;
            border-color: #7c5cfc;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #7c5cfc;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .login-box button:hover { background: #6d4aeb; }
        .login-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #f87171;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
        }
        .loading-msg {
            color: #a0a0b0;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
        }
        .dashboard { display: none; }
        .header {
            background: rgba(124, 92, 252, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 2px solid #7c5cfc;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .header p { color: #a0a0b0; font-size: 14px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(124, 92, 252, 0.1) 0%, rgba(124, 92, 252, 0.05) 100%);
            border: 1px solid rgba(124, 92, 252, 0.3);
            border-radius: 12px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .stat-card h3 {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: 700;
            color: #7c5cfc;
            margin-bottom: 5px;
        }
        .stat-card .change { font-size: 12px; color: #4ade80; }
        .section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .section h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #7c5cfc;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            background: rgba(124, 92, 252, 0.1);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }
        tr:hover { background: rgba(255, 255, 255, 0.03); }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-success { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .badge-warning { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .badge-danger { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .badge-pro { background: rgba(124, 92, 252, 0.2); color: #7c5cfc; }
        .refresh-btn {
            background: #7c5cfc;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .refresh-btn:hover { background: #6d4aeb; }
        .logout-btn {
            background: #f87171;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            float: right;
        }
        .logout-btn:hover { background: #ef4444; }
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .stat-card .value { font-size: 28px; }
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>🔐 Dashboard Admin</h1>
            <div class="subtitle">Kayla - Painel Administrativo</div>
            <input type="password" id="adminPassword" placeholder="Senha de administrador" onkeypress="if(event.key==='Enter')fazerLogin()">
            <button id="btnLogin" onclick="fazerLogin()">Entrar</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardScreen" class="dashboard">
        <div class="header">
            <h1>📊 Dashboard Kayla</h1>
            <p>Painel Administrativo - Métricas e Financeiro</p>
            <button class="logout-btn" onclick="fazerLogout()">Sair</button>
        </div>

        <div class="container">
            <button class="refresh-btn" onclick="atualizarDashboard()">🔄 Atualizar Dados</button>

            <!-- Cards de Estatísticas -->
            <div class="stats-grid" id="statsGrid">
                <div style="text-align:center;padding:40px;color:#a0a0b0">Carregando...</div>
            </div>

            <!-- Gráficos -->
            <div class="charts-grid">
                <div class="chart-container">
                    <h3 style="margin-bottom:15px">📈 Visitas</h3>
                    <canvas id="visitasChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3 style="margin-bottom:15px">💰 Receita</h3>
                    <canvas id="receitaChart"></canvas>
                </div>
            </div>

            <!-- Usuários Recentes -->
            <div class="section">
                <h2>👥 Usuários Recentes</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Email</th>
                                <th>Data de Cadastro</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="usuariosTable">
                            <tr><td colspan="3" style="text-align:center;padding:40px;color:#a0a0b0">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Últimos Pagamentos -->
            <div class="section">
                <h2>💵 Últimos Pagamentos</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Data</th>
                                <th>Usuário</th>
                                <th>Valor</th>
                                <th>Método</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="pagamentosTable">
                            <tr><td colspan="5" style="text-align:center;padding:40px;color:#a0a0b0">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xwwklngrkvdwgiinycvt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh3d2tsbmdya3Zkd2dpaW55Y3Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NDYwODUsImV4cCI6MjA5NjAyMjA4NX0.XhnNESlgV4Q_kkXRYh4QY2e9RBG-u-qgP9sDHyKfEG4';
        const EDGE_FUNCTION_URL = 'https://xwwklngrkvdwgiinycvt.supabase.co/functions/v1/validar-admin';
        
        let visitasChart, receitaChart;

        // Verificar se já está logado ao carregar
        window.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('admin_token');
            const expiresAt = sessionStorage.getItem('admin_expires');
            
            if (token && expiresAt && new Date(expiresAt) > new Date()) {
                mostrarDashboard();
            }
        });

        async function fazerLogin() {
            const senha = document.getElementById('adminPassword').value;
            const btn = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!senha) {
                errorMsg.textContent = '❌ Digite a senha';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Verificando...';
            errorMsg.textContent = '';
            
            try {
                const response = await fetch(EDGE_FUNCTION_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ senha: senha })
                });
                
                const data = await response.json();
                
                if (data.valido) {
                    // Salvar token e data de expiração
                    sessionStorage.setItem('admin_token', data.token);
                    sessionStorage.setItem('admin_expires', data.expiresAt);
                    mostrarDashboard();
                } else {
                    errorMsg.textContent = '❌ ' + (data.erro || 'Senha incorreta');
                }
            } catch (error) {
                errorMsg.textContent = '❌ Erro de conexão';
                console.error('Erro ao validar:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        }

        function fazerLogout() {
            sessionStorage.removeItem('admin_token');
            sessionStorage.removeItem('admin_expires');
            location.reload();
        }

        function mostrarDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            atualizarDashboard();
            // Atualizar a cada 30 segundos
            setInterval(atualizarDashboard, 30000);
        }

        async function atualizarDashboard() {
            console.log('Atualizando dashboard...');
            await carregarEstatisticas();
            await carregarUsuarios();
            await carregarPagamentos();
            await carregarGraficos();
        }

        async function carregarEstatisticas() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/dashboard_stats`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const data = await response.json();
                console.log('Estatísticas:', data);
                const stats = data[0] || {};
                
                const html = `
                    <div class="stat-card">
                        <h3>🌐 VISITAS SITE</h3>
                        <div class="value">${stats.total_visitas_site || 0}</div>
                        <div class="change">Total acumulado</div>
                    </div>
                    <div class="stat-card">
                        <h3>📱 VISITAS APP</h3>
                        <div class="value">${stats.total_visitas_app || 0}</div>
                        <div class="change">Total acumulado</div>
                    </div>
                    <div class="stat-card">
                        <h3>⬇️ DOWNLOADS</h3>
                        <div class="value">${stats.total_downloads || 0}</div>
                        <div class="change">Total acumulado</div>
                    </div>
                    <div class="stat-card">
                        <h3>👥 USUÁRIOS</h3>
                        <div class="value">${stats.total_usuarios || 0}</div>
                        <div class="change">Cadastrados</div>
                    </div>
                    <div class="stat-card">
                        <h3>💎 ASSINATURAS ATIVAS</h3>
                        <div class="value">${stats.total_assinaturas_ativas || 0}</div>
                        <div class="change">Planos ativos</div>
                    </div>
                    <div class="stat-card">
                        <h3>💰 RECEITA TOTAL</h3>
                        <div class="value">R$ ${(stats.receita_total || 0).toFixed(2).replace('.', ',')}</div>
                        <div class="change">PIX: ${stats.pagamentos_pix || 0} | Cartão: ${stats.pagamentos_cartao || 0}</div>
                    </div>
                `;
                
                document.getElementById('statsGrid').innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar estatísticas:', error);
            }
        }

        async function carregarGraficos() {
            const visitasCtx = document.getElementById('visitasChart').getContext('2d');
            if (visitasChart) visitasChart.destroy();
            
            visitasChart = new Chart(visitasCtx, {
                type: 'bar',
                data: {
                    labels: ['Site', 'App', 'Download'],
                    datasets: [{
                        label: 'Visitas',
                        data: [0, 0, 0],
                        backgroundColor: ['#7c5cfc', '#4ade80', '#fbbf24']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } }
                }
            });

            const receitaCtx = document.getElementById('receitaChart').getContext('2d');
            if (receitaChart) receitaChart.destroy();
            
            receitaChart = new Chart(receitaCtx, {
                type: 'doughnut',
                data: {
                    labels: ['PIX', 'Cartão/Débito'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#4ade80', '#7c5cfc']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/dashboard_stats`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const data = await response.json();
                const s = data[0] || {};
                
                visitasChart.data.datasets[0].data = [
                    s.total_visitas_site || 0,
                    s.total_visitas_app || 0,
                    s.total_downloads || 0
                ];
                visitasChart.update();
                
                receitaChart.data.datasets[0].data = [
                    s.pagamentos_pix || 0,
                    s.pagamentos_cartao || 0
                ];
                receitaChart.update();
            } catch (error) {
                console.error('Erro ao carregar gráficos:', error);
            }
        }

        async function carregarUsuarios() {
            try {
                console.log('Carregando usuários via função...');
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_dashboard_users`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({})
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Erro na resposta:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Usuários carregados:', data);
                
                if (!data || data.length === 0) {
                    document.getElementById('usuariosTable').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#a0a0b0">Nenhum usuário cadastrado</td></tr>';
                    return;
                }
                
                const html = data.map(user => `
                    <tr>
                        <td>${user.email || 'N/A'}</td>
                        <td>${user.created_at ? new Date(user.created_at).toLocaleDateString('pt-BR') : 'N/A'}</td>
                        <td><span class="badge badge-success">Ativo</span></td>
                    </tr>
                `).join('');
                
                document.getElementById('usuariosTable').innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
                document.getElementById('usuariosTable').innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#f87171">Erro: ' + error.message + '</td></tr>';
            }
        }

        async function carregarPagamentos() {
            try {
                console.log('Carregando pagamentos via função...');
                
                const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_dashboard_pagamentos`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({})
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Erro na resposta:', errorText);
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Pagamentos carregados:', data);
                
                if (!data || data.length === 0) {
                    document.getElementById('pagamentosTable').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#a0a0b0">Nenhum pagamento registrado</td></tr>';
                    return;
                }
                
                const html = data.map(pag => `
                    <tr>
                        <td>${pag.created_at ? new Date(pag.created_at).toLocaleDateString('pt-BR') : 'N/A'}</td>
                        <td style="font-size:12px">${pag.email ? pag.email.substring(0, 20) + (pag.email.length > 20 ? '...' : '') : 'N/A'}</td>
                        <td>R$ ${pag.valor ? parseFloat(pag.valor).toFixed(2).replace('.', ',') : '0,00'}</td>
                        <td><span class="badge badge-pro">${pag.metodo_pagamento || 'N/A'}</span></td>
                        <td><span class="badge badge-${pag.status === 'aprovado' ? 'success' : pag.status === 'pendente' ? 'warning' : 'danger'}">${pag.status || 'N/A'}</span></td>
                    </tr>
                `).join('');
                
                document.getElementById('pagamentosTable').innerHTML = html;
            } catch (error) {
                console.error('Erro ao carregar pagamentos:', error);
                document.getElementById('pagamentosTable').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;color:#f87171">Erro: ' + error.message + '</td></tr>';
            }
        }
    </script>
</body>
</html>
