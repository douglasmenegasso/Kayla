<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Falhou - Kayla</title>
    <style>
        body {
            background: #0f0f13;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #2a2a35;
            border-radius: 12px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ff1744;
        }
        .subtitle {
            font-size: 14px;
            color: #a0a0b0;
            margin-bottom: 24px;
        }
        .btn {
            background: #7c5cfc;
            color: #fff;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="error-icon">❌</div>
        <div class="title">Pagamento não Aprovado</div>
        <div class="subtitle">Tente novamente ou entre em contato com o suporte.<br>Redirecionando em 3 segundos...</div>
        <a href="#" id="btnApp" class="btn">Voltar para o App</a>
    </div>

    <script>
        // ✅ Ler parâmetros do Mercado Pago da URL
        const urlParams = new URLSearchParams(window.location.search);
        const collectionStatus = urlParams.get('collection_status');
        const paymentId = urlParams.get('payment_id');
        const preferenceId = urlParams.get('preference_id');
        const externalReference = urlParams.get('external_reference');
        
        console.log('[MP Falha] Parâmetros:', { collectionStatus, paymentId, preferenceId, externalReference });
        
        // ✅ Construir URL com parâmetros
        const appUrl = '/app/?collection_status=' + encodeURIComponent(collectionStatus || 'rejected') +
                       '&payment_id=' + encodeURIComponent(paymentId || '') +
                       '&preference_id=' + encodeURIComponent(preferenceId || '') +
                       '&external_reference=' + encodeURIComponent(externalReference || '');
        
        // ✅ Atualizar botão
        document.getElementById('btnApp').href = appUrl;
        
        // ✅ Redirecionamento automático após 3 segundos
        setTimeout(function() {
            window.location.href = appUrl;
        }, 3000);
    </script>
</body>
</html>
